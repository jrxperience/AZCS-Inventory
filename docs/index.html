<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AZCS — Inventory Snapshot</title>
  <style>
    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --text:     #e2e8f0;
      --muted:    #8892a4;
      --green:    #22c55e;
      --green-bg: #052e16;
      --amber:    #f59e0b;
      --amber-bg: #1c1100;
      --accent:   #3b82f6;
      --input-bg: #12151e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Password Gate ── */
    #gate {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .gate-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 48px;
      text-align: center;
      width: 340px;
    }
    .gate-box h2 { font-size: 20px; margin-bottom: 6px; }
    .gate-box p  { color: var(--muted); margin-bottom: 24px; font-size: 13px; }
    .gate-box input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 15px;
      margin-bottom: 12px;
      outline: none;
    }
    .gate-box input:focus { border-color: var(--accent); }
    .gate-box button {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      padding: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .gate-box button:hover { background: #2563eb; }
    #gate-error {
      color: #f87171;
      font-size: 13px;
      margin-top: 10px;
      min-height: 18px;
    }

    /* ── App Shell ── */
    #app { display: none; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .header-left h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .header-left span { color: var(--muted); font-size: 12px; margin-left: 10px; }
    .stats {
      display: flex; gap: 20px;
    }
    .stat {
      text-align: center;
    }
    .stat .num { font-size: 22px; font-weight: 700; line-height: 1; }
    .stat .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }
    .stat.green .num { color: var(--green); }
    .stat.amber .num { color: var(--amber); }

    /* ── Panels ── */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: calc(100vh - 65px);
    }
    @media (max-width: 900px) {
      .panels { grid-template-columns: 1fr; height: auto; }
    }

    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .panel:last-child { border-right: none; }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .panel-header h2 { font-size: 14px; font-weight: 700; flex: 1; }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
    }
    .panel.in-stock .panel-header  { background: rgba(34,197,94,.06); }
    .panel.in-stock .panel-header h2 { color: var(--green); }
    .panel.in-stock .badge { background: var(--green-bg); color: var(--green); }
    .panel.out-stock .panel-header { background: rgba(245,158,11,.06); }
    .panel.out-stock .panel-header h2 { color: var(--amber); }
    .panel.out-stock .badge { background: var(--amber-bg); color: var(--amber); }
    .neg-qty { color: #f87171; font-weight: 700; }

    .search-bar {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .search-bar input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 12px;
      font-size: 13px;
      outline: none;
    }
    .search-bar input:focus { border-color: var(--accent); }

    .table-wrap {
      overflow-y: auto;
      flex: 1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      background: var(--surface);
      padding: 8px 10px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:hover { background: var(--surface); }
    tbody td {
      padding: 8px 10px;
      vertical-align: top;
      font-size: 13px;
      line-height: 1.4;
    }
    .item-name { font-weight: 500; }
    .item-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .qty-pill {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .in-stock  .qty-pill { background: var(--green-bg);  color: var(--green); }
    .out-stock .qty-pill { background: var(--amber-bg);  color: var(--amber); }
    .price-cell { color: var(--text); font-weight: 500; }
    .cost-cell  { color: var(--muted); font-size: 12px; }

    .no-results {
      padding: 32px;
      text-align: center;
      color: var(--muted);
    }

    /* scrollbar */
    .table-wrap::-webkit-scrollbar { width: 6px; }
    .table-wrap::-webkit-scrollbar-track { background: transparent; }
    .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Password Gate -->
<div id="gate">
  <div class="gate-box">
    <h2>AZCS Inventory</h2>
    <p>Enter the access password to view the inventory snapshot.</p>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password" />
    <button onclick="checkPassword()">View Inventory</button>
    <div id="gate-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <div class="header-left">
      <h1>AZ Cleaning Supplies — Inventory Snapshot</h1>
      <span id="generated-time"></span>
    </div>
    <div class="stats">
      <div class="stat green">
        <div class="num" id="count-in">—</div>
        <div class="lbl">In Stock</div>
      </div>
      <div class="stat amber">
        <div class="num" id="count-out">—</div>
        <div class="lbl">Out of Stock</div>
      </div>
    </div>
  </header>

  <div class="panels">
    <!-- In Stock Panel -->
    <div class="panel in-stock">
      <div class="panel-header">
        <h2>In Stock</h2>
        <span class="badge" id="badge-in">0</span>
      </div>
      <div class="search-bar">
        <input type="search" id="search-in" placeholder="Search name, SKU, vendor, category…" oninput="filterTable('in')" />
      </div>
      <div class="table-wrap">
        <table id="table-in">
          <thead>
            <tr>
              <th>Item</th>
              <th>SKU</th>
              <th>Vendor</th>
              <th>Qty</th>
              <th>Price</th>
            </tr>
          </thead>
          <tbody id="body-in"></tbody>
        </table>
      </div>
    </div>

    <!-- Out of Stock Panel -->
    <div class="panel out-stock">
      <div class="panel-header">
        <h2>Recently Out of Stock</h2>
        <span class="badge" id="badge-out">0</span>
      </div>
      <div class="search-bar">
        <input type="search" id="search-out" placeholder="Search name, SKU, vendor, category…" oninput="filterTable('out')" />
      </div>
      <div class="table-wrap">
        <table id="table-out">
          <thead>
            <tr>
              <th>Item</th>
              <th>SKU</th>
              <th>Vendor</th>
              <th>Cost</th>
              <th>Price</th>
            </tr>
          </thead>
          <tbody id="body-out"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // ── Password ──────────────────────────────────────────────────
  // To change: update PASSWORD_HASH to sha256(newPassword)
  const PASSWORD_HASH = "a591b5b26d6c17a2b0dcab7efdd8fa5b6ef0aeeda7a7c4a1f0ecf7c8bcfe6b2e"; // AZCS2026

  async function sha256(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
  }

  document.getElementById("pw-input").addEventListener("keydown", e => {
    if (e.key === "Enter") checkPassword();
  });

  async function checkPassword() {
    const val = document.getElementById("pw-input").value;
    const hash = await sha256(val);
    if (hash === PASSWORD_HASH) {
      document.getElementById("gate").style.display = "none";
      document.getElementById("app").style.display  = "block";
      loadData();
    } else {
      document.getElementById("gate-error").textContent = "Incorrect password. Try again.";
      document.getElementById("pw-input").select();
    }
  }

  // ── Data ──────────────────────────────────────────────────────
  let DATA = { in_stock: [], out_of_stock: [] };

  async function loadData() {
    try {
      const res = await fetch("stock_data.json?v=" + Date.now());
      DATA = await res.json();
    } catch(e) {
      DATA = { in_stock: [], out_of_stock: [], generated: "N/A" };
    }

    document.getElementById("generated-time").textContent =
      DATA.generated ? "Last updated: " + DATA.generated : "";
    document.getElementById("count-in").textContent  = DATA.in_stock.length;
    document.getElementById("count-out").textContent = DATA.out_of_stock.length;

    renderTable("in",  DATA.in_stock);
    renderTable("out", DATA.out_of_stock);
  }

  function fmt(val) {
    if (!val || val === 0) return "—";
    return "$" + Number(val).toFixed(2);
  }

  function renderTable(panel, rows) {
    const tbody = document.getElementById("body-" + panel);
    const badge = document.getElementById("badge-" + panel);
    badge.textContent = rows.length;

    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="5" class="no-results">No items</td></tr>`;
      return;
    }

    tbody.innerHTML = rows.map(r => {
      const qtyLabel = panel === "in"
        ? `<span class="qty-pill">${r.total_qty}</span>` +
          (r.qty_az || r.qty_azcs
            ? `<div class="item-sub">AZ: ${r.qty_az} &nbsp;|&nbsp; AZCS: ${r.qty_azcs}</div>`
            : "")
        : `<span class="qty-pill neg-qty">${r.total_qty}</span>` +
          `<div class="item-sub">AZ: ${r.qty_az} &nbsp;|&nbsp; AZCS: ${r.qty_azcs}</div>`;

      const priceCell = panel === "in"
        ? `<span class="price-cell">${fmt(r.price)}</span>`
        : `<div class="price-cell">${fmt(r.price)}</div><div class="cost-cell">Cost: ${fmt(r.cost)}</div>`;

      return `<tr
        data-name="${esc(r.name)}"
        data-sku="${esc(r.sku)}"
        data-vendor="${esc(r.vendor)}"
        data-category="${esc(r.category)}">
        <td>
          <div class="item-name">${esc(r.name)}</div>
          ${r.category ? `<div class="item-sub">${esc(r.category)}</div>` : ""}
        </td>
        <td>
          <div>${esc(r.sku) || "—"}</div>
          ${r.vendor_code && r.vendor_code !== r.sku ? `<div class="item-sub">${esc(r.vendor_code)}</div>` : ""}
        </td>
        <td>${esc(r.vendor) || "—"}</td>
        <td>${qtyLabel}</td>
        <td>${priceCell}</td>
      </tr>`;
    }).join("");
  }

  function filterTable(panel) {
    const q = document.getElementById("search-" + panel).value.toLowerCase().trim();
    const rows = document.querySelectorAll("#body-" + panel + " tr");
    let visible = 0;
    rows.forEach(tr => {
      if (!tr.dataset.name) return; // no-results row
      const match = !q
        || tr.dataset.name.toLowerCase().includes(q)
        || tr.dataset.sku.toLowerCase().includes(q)
        || tr.dataset.vendor.toLowerCase().includes(q)
        || tr.dataset.category.toLowerCase().includes(q);
      tr.style.display = match ? "" : "none";
      if (match) visible++;
    });
    document.getElementById("badge-" + panel).textContent = visible;
  }

  function esc(str) {
    return String(str || "")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }
</script>
</body>
</html>
